version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - connecthub-net

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: ${FRONTEND_API_URL:-http://localhost:4000/api/v1}
        WS_URL: ${FRONTEND_WS_URL:-http://localhost:4000}
    ports:
      - '8080:80'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - connecthub-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - connecthub-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - connecthub-net

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ES_PASSWORD}
      - xpack.security.enabled=true
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - '9200:9200'
    networks:
      - connecthub-net

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - connecthub-net

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:

networks:
  connecthub-net:
    driver: bridge
